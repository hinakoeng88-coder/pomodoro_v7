<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=375px,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Pomodoro</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&family=Nunito+Sans:wght@300;400;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{width:375px;min-height:667px;font-family:'Nunito Sans',sans-serif;position:relative;overflow-x:hidden;background:#0a1a2e;}
#bg{position:fixed;inset:0;background:radial-gradient(ellipse 120% 60% at 50% 100%,#0a2a4a 0%,transparent 70%),radial-gradient(ellipse 80% 50% at 20% 80%,#0e3d5c 0%,transparent 60%),linear-gradient(180deg,#87bde8 0%,#aed0ee 18%,#c8e3f5 32%,#6aaed4 38%,#2d7caa 48%,#1a5e8a 62%,#4a7c6a 72%,#2e5244 85%,#1a3328 100%);z-index:0;transition:background 0.8s;}
#bg-image{position:fixed;inset:0;background-size:cover;background-position:center;opacity:0;transition:opacity 1s;z-index:1;}
#ocean-anim{position:fixed;left:0;right:0;top:37%;height:30%;background:repeating-linear-gradient(90deg,transparent 0,rgba(255,255,255,0.04) 2px,transparent 4px,transparent 20px);animation:shimmer 4s linear infinite;z-index:1;}
@keyframes shimmer{to{background-position:60px 0;}}
#sun{position:fixed;top:26%;left:50%;transform:translateX(-50%);width:40px;height:40px;background:radial-gradient(circle,rgba(255,240,180,0.7) 0%,rgba(255,220,100,0.3) 40%,transparent 70%);border-radius:50%;z-index:1;}
#lh{position:fixed;top:30%;right:22%;width:4px;height:24px;background:linear-gradient(180deg,#f5f0e8,#d4c9a8);border-radius:2px 2px 0 0;z-index:2;}
#lh::after{content:'';position:absolute;top:-5px;left:-3px;width:10px;height:8px;background:#f0e8d0;border-radius:50% 50% 0 0;}
#ov{position:fixed;inset:0;background:rgba(10,30,50,0.18);z-index:3;}
.page{position:relative;z-index:10;width:375px;min-height:667px;display:none;flex-direction:column;align-items:center;}
.page.active{display:flex;}
.topbar{width:100%;display:flex;align-items:center;justify-content:space-between;padding:14px 16px 6px;}
.topbar-clock{font-size:13px;color:rgba(255,255,255,0.85);font-weight:600;font-family:'Nunito',sans-serif;}
.topbar-title{font-size:12px;color:rgba(255,255,255,0.6);letter-spacing:.12em;}
.topbar-right{display:flex;align-items:center;gap:8px;}
.icon-btn{width:32px;height:32px;border-radius:50%;border:1px solid rgba(255,255,255,0.25);background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.8);font-size:15px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.2s;flex-shrink:0;}
.icon-btn:active{background:rgba(255,255,255,0.2);}
.tabs{display:flex;gap:6px;padding:6px 16px 0;width:100%;}
.tab{flex:1;padding:8px 4px;border-radius:20px;border:1px solid rgba(255,255,255,0.25);background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.6);font-size:12px;font-family:'Nunito',sans-serif;font-weight:600;cursor:pointer;transition:all 0.2s;text-align:center;}
.tab.active{background:rgba(255,255,255,0.26);border-color:rgba(255,255,255,0.6);color:#fff;}
.tsec{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding-bottom:8px;}
.slabel{font-size:11px;color:rgba(255,255,255,0.65);letter-spacing:.16em;text-transform:uppercase;margin-bottom:16px;}

.rw{position:relative;width:210px;height:210px;margin-bottom:26px;}
.rw svg{transform:rotate(-90deg);}
#rt{fill:none;stroke:rgba(255,255,255,0.13);stroke-width:5;}
#rp{fill:none;stroke:rgba(255,255,255,0.88);stroke-width:5;stroke-linecap:round;transition:stroke-dashoffset 1s linear,stroke 0.5s;filter:drop-shadow(0 0 6px rgba(200,230,255,0.5));}
.td{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.tt{font-family:'Nunito',sans-serif;font-size:54px;font-weight:700;color:#fff;letter-spacing:-1px;line-height:1;}
.tsub{font-size:11px;color:rgba(255,255,255,0.55);margin-top:6px;letter-spacing:.12em;}
.ctrls{display:flex;align-items:center;gap:20px;}
.bs{width:46px;height:46px;border-radius:50%;border:1px solid rgba(255,255,255,0.28);background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.8);font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.2s;}
.bs:active{transform:scale(0.92);background:rgba(255,255,255,0.2);}
.bm{width:68px;height:68px;border-radius:50%;border:none;background:rgba(255,255,255,0.9);color:#0a2a4a;font-size:22px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.2s;box-shadow:0 4px 20px rgba(0,50,100,0.3),0 0 0 4px rgba(255,255,255,0.12);}
.bm:active{transform:scale(0.93);}
.dots{display:flex;gap:7px;margin-top:20px;}
.dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,0.2);transition:background 0.3s;}
.dot.done{background:rgba(255,255,255,0.82);}
.dot.cur{background:rgba(255,255,255,0.52);}
.bnav{width:100%;display:flex;justify-content:space-around;padding:12px 10px 22px;border-top:1px solid rgba(255,255,255,0.1);background:rgba(10,30,50,0.2);}
.nb{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 10px;border-radius:12px;background:transparent;border:none;color:rgba(255,255,255,0.45);font-size:10px;font-family:'Nunito',sans-serif;font-weight:600;cursor:pointer;transition:all 0.2s;}
.nb .ic{font-size:19px;}
.nb.active{color:rgba(255,255,255,0.92);}

.sheet-wrap{position:fixed;inset:0;z-index:200;background:rgba(5,15,30,0.72);display:none;align-items:flex-end;justify-content:center;}
.sheet-wrap.show{display:flex;}
.sheet{width:375px;background:#0d1e30;border-radius:24px 24px 0 0;border-top:1px solid rgba(255,255,255,0.13);padding:0 0 36px;max-height:88vh;overflow-y:auto;}
.sh{width:36px;height:4px;background:rgba(255,255,255,0.22);border-radius:2px;margin:12px auto 0;}
.sh-head{padding:16px 20px 12px;border-bottom:1px solid rgba(255,255,255,0.08);}
.sh-title{font-family:'Nunito',sans-serif;font-size:19px;font-weight:700;color:#fff;}
.sh-sub{font-size:12px;color:rgba(255,255,255,0.5);margin-top:2px;}
.sh-body{padding:16px 20px;}
.sl{font-size:11px;color:rgba(255,255,255,0.45);letter-spacing:.13em;text-transform:uppercase;margin-bottom:8px;margin-top:16px;}
.sl:first-child{margin-top:0;}
.cats{display:flex;flex-wrap:wrap;gap:7px;}
.cat{padding:7px 13px;border-radius:20px;border:1px solid rgba(255,255,255,0.18);background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.65);font-size:12px;font-family:'Nunito',sans-serif;font-weight:600;cursor:pointer;transition:all 0.2s;}
.cat.sel{border-color:rgba(255,255,255,0.65);background:rgba(255,255,255,0.18);color:#fff;}
.tinput{width:100%;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.14);border-radius:12px;padding:10px 14px;color:#fff;font-size:14px;font-family:'Nunito',sans-serif;outline:none;transition:border-color 0.2s;}
.tinput:focus{border-color:rgba(255,255,255,0.38);}
.tinput::placeholder{color:rgba(255,255,255,0.28);}
.hchips{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.hc{padding:5px 10px;border-radius:12px;border:1px solid rgba(255,255,255,0.14);background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.6);font-size:11px;font-family:'Nunito',sans-serif;cursor:pointer;}
.hc:active{background:rgba(255,255,255,0.14);}
.sh-foot{display:flex;gap:10px;padding:0 20px;margin-top:18px;}
.btn-skip{flex:1;padding:12px;border-radius:14px;border:1px solid rgba(255,255,255,0.18);background:transparent;color:rgba(255,255,255,0.55);font-size:13px;font-family:'Nunito',sans-serif;font-weight:600;cursor:pointer;}
.btn-save{flex:2;padding:12px;border-radius:14px;border:none;background:rgba(255,255,255,0.9);color:#0a2a4a;font-size:13px;font-weight:700;font-family:'Nunito',sans-serif;cursor:pointer;}
.btn-save:active{transform:scale(0.98);}
.scard{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:14px 16px;margin-bottom:12px;}
.scard-title{font-size:11px;color:rgba(255,255,255,0.4);letter-spacing:.13em;text-transform:uppercase;margin-bottom:10px;}
.srow{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.06);}
.srow:last-child{border-bottom:none;}
.srow-label{font-size:14px;color:rgba(255,255,255,0.82);font-family:'Nunito',sans-serif;font-weight:600;}
.srow-val{display:flex;align-items:center;gap:9px;}
.step{width:28px;height:28px;border-radius:50%;border:1px solid rgba(255,255,255,0.22);background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.75);font-size:15px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.step:active{background:rgba(255,255,255,0.22);}
.snum{font-size:15px;color:#fff;font-weight:700;min-width:30px;text-align:center;font-family:'Nunito',sans-serif;}
.cat-manage{display:flex;flex-direction:column;gap:8px;}
.cat-item{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:9px 12px;}
.cat-emoji{font-size:16px;cursor:pointer;}
.cat-name-input{flex:1;background:transparent;border:none;color:#fff;font-size:13px;font-family:'Nunito',sans-serif;font-weight:600;outline:none;}
.cat-name-input::placeholder{color:rgba(255,255,255,0.25);}
.cat-del{width:26px;height:26px;border-radius:50%;border:1px solid rgba(255,100,100,0.3);background:rgba(255,100,100,0.1);color:rgba(255,150,150,0.8);font-size:13px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.add-cat-btn{width:100%;padding:11px;border-radius:12px;border:1.5px dashed rgba(255,255,255,0.22);background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.55);font-size:13px;font-family:'Nunito',sans-serif;font-weight:600;cursor:pointer;margin-top:10px;}
.settings-save-btn{width:100%;padding:13px;border-radius:14px;border:none;background:rgba(255,255,255,0.88);color:#0a2a4a;font-size:14px;font-weight:700;font-family:'Nunito',sans-serif;cursor:pointer;margin-top:4px;}
.settings-save-btn:active{transform:scale(0.98);}
.ph{width:100%;display:flex;align-items:center;justify-content:space-between;padding:46px 20px 12px;}
.pt{font-family:'Nunito',sans-serif;font-size:24px;font-weight:700;color:#fff;}
.stats-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 16px;width:100%;margin-bottom:6px;}
.stat{background:rgba(255,255,255,0.09);border:1px solid rgba(255,255,255,0.11);border-radius:14px;padding:12px 14px;text-align:center;}
.stat-n{font-family:'Nunito',sans-serif;font-size:26px;font-weight:700;color:#fff;}
.stat-l{font-size:11px;color:rgba(255,255,255,0.5);margin-top:2px;}
.log-list{width:100%;padding:0 16px;flex:1;overflow-y:auto;padding-bottom:90px;}
.log-day-label{font-size:11px;color:rgba(255,255,255,0.4);letter-spacing:.1em;margin:12px 0 6px;padding:0 2px;}
.log-item{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.09);border-radius:12px;padding:10px 13px;margin-bottom:7px;display:flex;align-items:center;gap:11px;}
.li-cat{min-width:40px;padding:3px 8px;border-radius:8px;font-size:10px;font-weight:700;text-align:center;font-family:'Nunito',sans-serif;}
.li-body{flex:1;min-width:0;}
.li-content{font-size:13px;color:rgba(255,255,255,0.82);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:'Nunito',sans-serif;}
.li-meta{font-size:11px;color:rgba(255,255,255,0.38);margin-top:2px;}
.li-min{font-size:12px;color:rgba(255,255,255,0.48);white-space:nowrap;font-family:'Nunito',sans-serif;font-weight:600;}
.empty-log{text-align:center;padding:40px 20px;color:rgba(255,255,255,0.32);font-size:14px;line-height:2;font-family:'Nunito',sans-serif;}
.galgrid{width:100%;padding:6px 14px;display:grid;grid-template-columns:1fr 1fr;gap:10px;overflow-y:auto;flex:1;padding-bottom:90px;}
.gi{aspect-ratio:1;border-radius:14px;overflow:hidden;position:relative;cursor:pointer;border:2px solid transparent;transition:all 0.22s;}
.gi.sel{border-color:rgba(255,255,255,0.88);}
.gck{position:absolute;top:7px;right:7px;width:22px;height:22px;border-radius:50%;background:rgba(255,255,255,0.92);display:none;align-items:center;justify-content:center;font-size:12px;color:#111;}
.gi.sel .gck{display:flex;}
.gup{grid-column:span 2;}
.ubtn{width:100%;padding:13px;border-radius:14px;border:1.5px dashed rgba(255,255,255,0.28);background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.65);font-size:13px;font-family:'Nunito',sans-serif;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;}
#fi{display:none;}
.cp{width:100%;height:80px;border-radius:11px;position:relative;overflow:hidden;}
.cpl{position:absolute;bottom:8px;left:10px;font-size:11px;color:rgba(255,255,255,0.9);font-family:'Nunito',sans-serif;font-weight:600;}
.ha{font-size:12px;color:rgba(255,255,255,0.7);background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.22);border-radius:20px;padding:6px 13px;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:600;}
#toast{position:fixed;top:64px;left:50%;transform:translateX(-50%) translateY(-14px);background:rgba(255,255,255,0.16);border:1px solid rgba(255,255,255,0.28);border-radius:20px;padding:8px 16px;font-size:12px;color:#fff;opacity:0;transition:all 0.28s;z-index:400;white-space:nowrap;font-family:'Nunito',sans-serif;font-weight:600;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div id="bg"></div><div id="bg-image"></div><div id="ocean-anim"></div><div id="sun"></div><div id="lh"></div><div id="ov"></div>

<div class="page active" id="pg-timer">
  <div class="topbar">
    <span class="topbar-clock" id="clock">9:41</span>
    <span class="topbar-title">POMODORO</span>
    <div class="topbar-right"><button class="icon-btn" onclick="openSettings()">⚙</button></div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="setMode('focus')">🍅 集中</button>
    <button class="tab" onclick="setMode('short')">☕ 小休憩</button>
    <button class="tab" onclick="setMode('long')">🛋 長休憩</button>
  </div>
  <div class="tsec">
    <p class="slabel" id="slabel">SESSION 1 / 4</p>
    <div class="rw">
      <svg width="210" height="210" viewBox="0 0 210 210">
        <circle id="rt" cx="105" cy="105" r="93"/>
        <circle id="rp" cx="105" cy="105" r="93"/>
      </svg>
      <div class="td">
        <div class="tt" id="tdisp">25:00</div>
        <div class="tsub" id="tsub">FOCUS TIME</div>
      </div>
    </div>
    <div class="ctrls">
      <button class="bs" onclick="resetTimer()">↺</button>
      <button class="bm" id="pbtn" onclick="toggleTimer()">▶</button>
      <button class="bs" onclick="skipSession()">⇥</button>
    </div>
    <div class="dots" id="dots"></div>
  </div>
  <nav class="bnav">
    <button class="nb active" onclick="goPage('pg-timer','n0')" id="n0"><span class="ic">⏱</span><span>タイマー</span></button>
    <button class="nb" onclick="goPage('pg-log','n1')" id="n1"><span class="ic">📋</span><span>記録</span></button>
    <button class="nb" onclick="goPage('pg-gallery','n2')" id="n2"><span class="ic">🖼</span><span>背景</span></button>
  </nav>
</div>

<div class="page" id="pg-log">
  <div class="ph"><span class="pt">きろく</span><div style="display:flex;gap:8px;align-items:center;"><button class="icon-btn" onclick="openSettings()">⚙</button><button class="ha" onclick="clearLog()">クリア</button></div></div>
  <div class="stats-row">
    <div class="stat"><div class="stat-n" id="stat-today">0<span style="font-size:13px;opacity:.6;font-weight:400"> 分</span></div><div class="stat-l">今日の集中</div></div>
    <div class="stat"><div class="stat-n" id="stat-total">0<span style="font-size:13px;opacity:.6;font-weight:400"> 分</span></div><div class="stat-l">累計集中</div></div>
  </div>
  <div class="log-list" id="log-list"></div>
  <nav class="bnav">
    <button class="nb" onclick="goPage('pg-timer','n0')" id="n0b"><span class="ic">⏱</span><span>タイマー</span></button>
    <button class="nb active" onclick="goPage('pg-log','n1')" id="n1b"><span class="ic">📋</span><span>記録</span></button>
    <button class="nb" onclick="goPage('pg-gallery','n2')" id="n2b"><span class="ic">🖼</span><span>背景</span></button>
  </nav>
</div>

<div class="page" id="pg-gallery">
  <div class="ph"><span class="pt">背景</span><div style="display:flex;gap:8px;align-items:center;"><button class="icon-btn" onclick="openSettings()">⚙</button><button class="ha" onclick="clearBg()">クリア</button></div></div>
  <div class="galgrid" id="galgrid">
    <div class="gup">
      <button class="ubtn" onclick="document.getElementById('fi').click()">
        <span style="font-size:20px">🖼</span><span>カメラロールから追加</span>
      </button>
      <input type="file" id="fi" accept="image/*" multiple onchange="addPhotos(event)" style="display:none">
    </div>
    <div class="gi sel" onclick="selPreset('roca')" id="pr-roca"><div class="cp" style="background:linear-gradient(180deg,#87bde8 0%,#aed0ee 25%,#6aaed4 40%,#2d7caa 60%,#4a7c6a 80%,#1a3328 100%)"><span class="cpl">ロカ岬</span></div><div class="gck">✓</div></div>
    <div class="gi" onclick="selPreset('dawn')" id="pr-dawn"><div class="cp" style="background:linear-gradient(135deg,#ffd4b8,#ffb3c1,#c9b3e3)"><span class="cpl">夜明け</span></div><div class="gck">✓</div></div>
    <div class="gi" onclick="selPreset('night')" id="pr-night"><div class="cp" style="background:linear-gradient(180deg,#0a0e27,#1a2a5e,#0d1a3a)"><span class="cpl">夜空</span></div><div class="gck">✓</div></div>
    <div class="gi" onclick="selPreset('forest')" id="pr-forest"><div class="cp" style="background:linear-gradient(135deg,#134e5e,#71b280)"><span class="cpl">森林</span></div><div class="gck">✓</div></div>
    <div class="gi" onclick="selPreset('sunset')" id="pr-sunset"><div class="cp" style="background:linear-gradient(180deg,#2c1654,#e94e77,#f7971e,#ffd200)"><span class="cpl">サンセット</span></div><div class="gck">✓</div></div>
    <div class="gi" onclick="selPreset('cherry')" id="pr-cherry"><div class="cp" style="background:linear-gradient(135deg,#ffdde1,#ee9ca7,#c9a3b5)"><span class="cpl">桜</span></div><div class="gck">✓</div></div>
  </div>
  <nav class="bnav">
    <button class="nb" onclick="goPage('pg-timer','n0')" id="n0c"><span class="ic">⏱</span><span>タイマー</span></button>
    <button class="nb" onclick="goPage('pg-log','n1')" id="n1c"><span class="ic">📋</span><span>記録</span></button>
    <button class="nb active" onclick="goPage('pg-gallery','n2')" id="n2c"><span class="ic">🖼</span><span>背景</span></button>
  </nav>
</div>

<div class="sheet-wrap" id="rec-wrap">
  <div class="sheet">
    <div class="sh"></div>
    <div class="sh-head"><div class="sh-title">🍅 お疲れさまでした！</div><div class="sh-sub" id="rs-sub">25分の集中が完了しました</div></div>
    <div class="sh-body">
      <div class="sl">カテゴリー</div>
      <div class="cats" id="rec-cats"></div>
      <div class="sl" style="margin-top:16px;">内容</div>
      <input class="tinput" type="text" id="rec-content" placeholder="何をしていましたか？" autocomplete="off">
      <div class="hchips" id="hist-chips"></div>
    </div>
    <div class="sh-foot">
      <button class="btn-skip" onclick="skipRecord()">スキップ</button>
      <button class="btn-save" onclick="saveRecord()">記録する ✓</button>
    </div>
  </div>
</div>

<div class="sheet-wrap" id="set-wrap">
  <div class="sheet">
    <div class="sh"></div>
    <div class="sh-head"><div class="sh-title">⚙ 設定</div></div>
    <div class="sh-body">
      <div class="scard">
        <div class="scard-title">タイマー時間（分）</div>
        <div class="srow"><span class="srow-label">🍅 集中時間</span><div class="srow-val"><button class="step" onclick="adjSetting('focus',-5)">－</button><span class="snum" id="s-focus">25</span><button class="step" onclick="adjSetting('focus',5)">＋</button></div></div>
        <div class="srow"><span class="srow-label">☕ 小休憩</span><div class="srow-val"><button class="step" onclick="adjSetting('short',-1)">－</button><span class="snum" id="s-short">5</span><button class="step" onclick="adjSetting('short',1)">＋</button></div></div>
        <div class="srow"><span class="srow-label">🛋 長休憩</span><div class="srow-val"><button class="step" onclick="adjSetting('long',-5)">－</button><span class="snum" id="s-long">15</span><button class="step" onclick="adjSetting('long',5)">＋</button></div></div>
        <div class="srow"><span class="srow-label">🔁 セッション数</span><div class="srow-val"><button class="step" onclick="adjSetting('sessions',-1)">－</button><span class="snum" id="s-sessions">4</span><button class="step" onclick="adjSetting('sessions',1)">＋</button></div></div>
      </div>
      <div class="scard">
        <div class="scard-title">カテゴリー管理</div>
        <div class="cat-manage" id="cat-manage"></div>
        <button class="add-cat-btn" onclick="addCatRow()">＋ カテゴリーを追加</button>
      </div>
      <button class="settings-save-btn" onclick="saveSettings()">保存して閉じる</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const CIRC = 2 * Math.PI * 93;
const BG_DEF = 'radial-gradient(ellipse 120% 60% at 50% 100%,#0a2a4a 0%,transparent 70%),radial-gradient(ellipse 80% 50% at 20% 80%,#0e3d5c 0%,transparent 60%),linear-gradient(180deg,#87bde8 0%,#aed0ee 18%,#c8e3f5 32%,#6aaed4 38%,#2d7caa 48%,#1a5e8a 62%,#4a7c6a 72%,#2e5244 85%,#1a3328 100%)';
const BG_PRESETS = {roca:null,dawn:'linear-gradient(135deg,#ffd4b8,#ffb3c1,#c9b3e3)',night:'linear-gradient(180deg,#0a0e27,#1a2a5e,#0d1a3a)',forest:'linear-gradient(135deg,#134e5e,#71b280)',sunset:'linear-gradient(180deg,#2c1654,#e94e77,#f7971e,#ffd200)',cherry:'linear-gradient(135deg,#ffdde1,#ee9ca7,#c9a3b5)'};
const EMOJI_POOL = ['📝','💰','🛍','📚','✨','🎯','💻','🌿','🎨','🏃','🍵','💪','📖','🌸','⭐'];
const CAT_COLORS = ['rgba(26,94,138,0.4)','rgba(74,124,106,0.4)','rgba(122,92,138,0.4)','rgba(138,106,26,0.4)','rgba(90,90,122,0.4)','rgba(138,60,60,0.4)'];
const CAT_TEXT = ['#7ec8f0','#7ecfb4','#c4a0e0','#e0c068','#a0a0d4','#e08080'];
/* ══ PERSIST ══ */
const LS_VER = 'pomo_ver';
const APP_VER = '7'; // アプリ更新時もここを変えない限り記録は保持される

function lsGet(key, def) { try { const v=localStorage.getItem(key); return v ? JSON.parse(v) : def; } catch(e) { return def; } }
function lsSet(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) {} }

// バージョンが変わっても記録(pomo_logs)は消さない。設定だけ初期化が必要な場合に備えたフラグ管理
const storedVer = localStorage.getItem(LS_VER);
if (storedVer !== APP_VER) {
  // 記録は引き継ぎ、バージョンだけ更新
  localStorage.setItem(LS_VER, APP_VER);
}

const DEFAULT_CATS = [{id:'c1',emoji:'📝',name:'note'},{id:'c2',emoji:'💰',name:'リベ'},{id:'c3',emoji:'🛍',name:'ROOM'},{id:'c4',emoji:'📚',name:'読書'},{id:'c5',emoji:'✨',name:'その他'}];
let cfg        = lsGet('pomo_cfg', {focus:25,short:5,long:15,sessions:4});
let categories = lsGet('pomo_cats', DEFAULT_CATS);
let logs       = lsGet('pomo_logs', []);
let savedBg    = lsGet('pomo_bg', {type:'preset', name:'roca'}); // {type:'preset'|'photo', name, url}

let st = {mode:'focus',running:false,rem:cfg.focus*60,total:cfg.focus*60,session:1};
let pendingMin=0, selCatId='', iv=null;

/* ══ TIMER ══ */

function updateClock() {
  const n = new Date();
  document.getElementById('clock').textContent =
    n.getHours().toString().padStart(2,'0') + ':' + n.getMinutes().toString().padStart(2,'0');
}

function setMode(m) {
  if (st.running) return;
  st.mode = m;
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', ['focus','short','long'][i] === m));
  const mins = m==='focus' ? cfg.focus : m==='short' ? cfg.short : cfg.long;
  st.rem = st.total = mins * 60;
  const subs = {focus:'FOCUS TIME', short:'SHORT BREAK', long:'LONG BREAK'};
  const strokes = {focus:'rgba(255,255,255,0.88)', short:'rgba(160,240,190,0.88)', long:'rgba(160,210,255,0.88)'};
  document.getElementById('tsub').textContent = subs[m];
  document.getElementById('rp').style.stroke = strokes[m];
  updateDisp(); updateRing(1);
}

function toggleTimer() {
  if (st.running) {
    clearInterval(iv); st.running = false; document.getElementById('pbtn').textContent = '▶';
  } else {
    st.running = true; document.getElementById('pbtn').textContent = '⏸';
    iv = setInterval(tick, 1000);
  }
}

function tick() {
  if (st.rem <= 0) { clearInterval(iv); st.running = false; document.getElementById('pbtn').textContent = '▶'; onEnd(); return; }
  st.rem--; updateDisp(); updateRing(st.rem / st.total);
}

function onEnd() {
  if (st.mode === 'focus') {
    // 実際に経過した秒数から分数を算出
    const elapsed = Math.floor((st.total - st.rem) / 60);
    pendingMin = elapsed > 0 ? elapsed : cfg.focus; // 0秒の場合は完走扱い（タイマー自然終了）
    st.session++;
    if (st.session > cfg.sessions) { st.session = 1; renderDots(); setMode('long'); }
    else { renderDots(); setMode('short'); }
    setTimeout(() => openRecord(pendingMin, false), 300);
  } else { showToast('🍅 集中タイム、スタート！'); setMode('focus'); }
}

function resetTimer() {
  clearInterval(iv);
  if (st.mode === 'focus') {
    const elapsed = Math.floor((st.total - st.rem) / 60);
    if (elapsed >= 1) {
      pendingMin = elapsed;
      st.running = false; document.getElementById('pbtn').textContent = '▶';
      st.rem = st.total = cfg.focus * 60; updateDisp(); updateRing(1);
      setTimeout(() => openRecord(pendingMin, true), 200);
      return;
    }
  }
  st.running = false; document.getElementById('pbtn').textContent = '▶';
  const m = st.mode==='focus' ? cfg.focus : st.mode==='short' ? cfg.short : cfg.long;
  st.rem = st.total = m * 60; updateDisp(); updateRing(1);
}

function skipSession() {
  clearInterval(iv); st.running = false; document.getElementById('pbtn').textContent = '▶';
  if (st.mode === 'focus') {
    const elapsed = Math.floor((st.total - st.rem) / 60);
    if (elapsed >= 1 && st.rem > 0) {
      // 途中終了：経過分だけ記録
      pendingMin = elapsed;
      st.session++;
      if (st.session > cfg.sessions) { st.session = 1; renderDots(); setMode('long'); }
      else { renderDots(); setMode('short'); }
      setTimeout(() => openRecord(pendingMin, true), 300);
      return;
    } else if (st.rem === 0) {
      // ちょうど0秒：完走扱い
      onEnd(); return;
    }
    // 1分未満の場合は記録せずそのまま次へ
    st.session++;
    if (st.session > cfg.sessions) { st.session = 1; renderDots(); setMode('long'); }
    else { renderDots(); setMode('short'); }
    return;
  }
  onEnd();
}
function updateDisp() {
  document.getElementById('tdisp').textContent =
    Math.floor(st.rem/60).toString().padStart(2,'0') + ':' + (st.rem%60).toString().padStart(2,'0');
  document.getElementById('slabel').textContent = 'SESSION ' + st.session + ' / ' + cfg.sessions;
}
function updateRing(r) { document.getElementById('rp').style.strokeDashoffset = CIRC * (1 - r); }
function renderDots() {
  const c = document.getElementById('dots'); c.innerHTML = '';
  for (let i = 1; i <= cfg.sessions; i++) {
    const d = document.createElement('div');
    d.className = 'dot' + (i < st.session ? ' done' : i === st.session ? ' cur' : '');
    c.appendChild(d);
  }
}

/* ══ RECORD ══ */
function openRecord(min, partial=false) {
  selCatId = ''; document.getElementById('rec-content').value = '';
  const label = partial
    ? min + '分の集中（途中終了）を記録します 📝'
    : min + '分の集中が完了しました ✨';
  document.getElementById('rs-sub').textContent = label;
  renderRecCats(); document.getElementById('hist-chips').innerHTML = '';
  document.getElementById('rec-wrap').classList.add('show');
}
function renderRecCats() {
  const wrap = document.getElementById('rec-cats'); wrap.innerHTML = '';
  categories.forEach(cat => {
    const b = document.createElement('button'); b.className = 'cat' + (selCatId===cat.id ? ' sel' : '');
    b.textContent = cat.emoji + ' ' + cat.name;
    b.onclick = () => { selCatId = cat.id; document.querySelectorAll('#rec-cats .cat').forEach(x=>x.classList.remove('sel')); b.classList.add('sel'); renderHistChips(cat.id); };
    wrap.appendChild(b);
  });
}
function renderHistChips(catId) {
  const items = [...new Set(logs.filter(l=>l.catId===catId&&l.content&&l.content!=='（記録なし）').map(l=>l.content))].slice(0,5);
  const wrap = document.getElementById('hist-chips'); wrap.innerHTML = '';
  items.forEach(txt => { const c = document.createElement('button'); c.className = 'hc'; c.textContent = txt; c.onclick = () => { document.getElementById('rec-content').value = txt; }; wrap.appendChild(c); });
}
function saveRecord() {
  const content = document.getElementById('rec-content').value.trim();
  const isPartial = document.getElementById('rs-sub').textContent.includes('途中');
  logs.unshift({id:Date.now(), catId:selCatId||categories[categories.length-1].id, content:content||'記録なし', min:pendingMin, partial:isPartial, dt:new Date().toISOString()});
  lsSet('pomo_logs', logs);
  document.getElementById('rec-wrap').classList.remove('show'); renderLog(); showToast('✓ 記録しました！ +' + pendingMin + '分');
}
function skipRecord() {
  logs.unshift({id:Date.now(), catId:categories[categories.length-1].id, content:'（記録なし）', min:pendingMin, dt:new Date().toISOString()});
  lsSet('pomo_logs', logs);
  document.getElementById('rec-wrap').classList.remove('show'); renderLog();
}

/* ══ LOG ══ */
function getCatById(id) { return categories.find(c=>c.id===id) || {emoji:'✨', name:'その他'}; }
function getCatColor(id) { const idx = categories.findIndex(c=>c.id===id); const i = idx < 0 ? 0 : idx; return {bg:CAT_COLORS[i%CAT_COLORS.length], text:CAT_TEXT[i%CAT_TEXT.length]}; }
function renderLog() {
  const today = new Date().toDateString();
  const todayMin = logs.filter(l=>new Date(l.dt).toDateString()===today).reduce((s,l)=>s+l.min, 0);
  const totalMin = logs.reduce((s,l)=>s+l.min, 0);
  document.getElementById('stat-today').innerHTML = todayMin + '<span style="font-size:13px;opacity:.6;font-weight:400"> 分</span>';
  document.getElementById('stat-total').innerHTML = totalMin + '<span style="font-size:13px;opacity:.6;font-weight:400"> 分</span>';
  const list = document.getElementById('log-list');
  if (!logs.length) { list.innerHTML = '<div class="empty-log">まだ記録がありません 🌊<br>最初のポモドーロを<br>スタートしよう！</div>'; return; }
  const grouped = {};
  logs.forEach(l => { const dk = fmtDate(l.dt); if (!grouped[dk]) grouped[dk]=[]; grouped[dk].push(l); });
  list.innerHTML = '';
  Object.keys(grouped).forEach(dk => {
    const dh = document.createElement('div'); dh.className = 'log-day-label'; dh.textContent = dk; list.appendChild(dh);
    grouped[dk].forEach(l => {
      const cat = getCatById(l.catId), col = getCatColor(l.catId);
      const el = document.createElement('div'); el.className = 'log-item';
      el.innerHTML = `<div class="li-cat" style="background:${col.bg};color:${col.text};">${cat.emoji} ${cat.name}</div><div class="li-body"><div class="li-content">${escHtml(l.content)}</div><div class="li-meta">${fmtTime(l.dt)}${l.partial ? ' · 途中' : ''}</div></div><div class="li-min">${l.min}分${l.partial ? '…' : ''}</div>`;
      list.appendChild(el);
    });
  });
}
function fmtDate(iso) { const d=new Date(iso),n=new Date(); if(d.toDateString()===n.toDateString()) return '今日'; return d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日'; }
function fmtTime(iso) { const d=new Date(iso); return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0'); }
function escHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function clearLog() { if (!logs.length) return; logs=[]; lsSet('pomo_logs',[]); renderLog(); showToast('記録をクリアしました'); }

/* ══ SETTINGS ══ */
function openSettings() {
  document.getElementById('s-focus').textContent = cfg.focus;
  document.getElementById('s-short').textContent = cfg.short;
  document.getElementById('s-long').textContent = cfg.long;
  document.getElementById('s-sessions').textContent = cfg.sessions;
  renderCatManage(); document.getElementById('set-wrap').classList.add('show');
}
function adjSetting(key, delta) {
  const lim = {focus:[5,60],short:[1,15],long:[5,30],sessions:[2,8]};
  cfg[key] = Math.max(lim[key][0], Math.min(lim[key][1], cfg[key]+delta));
  document.getElementById('s-'+key).textContent = cfg[key];
}
function renderCatManage() {
  const wrap = document.getElementById('cat-manage'); wrap.innerHTML = '';
  categories.forEach(cat => {
    const row = document.createElement('div'); row.className = 'cat-item';
    const em = document.createElement('span'); em.className = 'cat-emoji'; em.textContent = cat.emoji;
    em.onclick = () => { const p=EMOJI_POOL; cat.emoji=p[(p.indexOf(cat.emoji)+1)%p.length]; em.textContent=cat.emoji; };
    const inp = document.createElement('input'); inp.className = 'cat-name-input'; inp.value = cat.name; inp.placeholder = 'カテゴリー名'; inp.oninput = () => { cat.name = inp.value; };
    const del = document.createElement('button'); del.className = 'cat-del'; del.textContent = '✕';
    del.onclick = () => { if (categories.length<=1) { showToast('最低1つは必要です'); return; } categories=categories.filter(c=>c.id!==cat.id); renderCatManage(); };
    row.appendChild(em); row.appendChild(inp); row.appendChild(del); wrap.appendChild(row);
  });
}
function addCatRow() {
  categories.push({id:'c'+Date.now(), emoji:EMOJI_POOL[categories.length%EMOJI_POOL.length], name:'新しいカテゴリー'});
  renderCatManage();
  setTimeout(() => { const inputs=document.querySelectorAll('#cat-manage .cat-name-input'); const last=inputs[inputs.length-1]; if(last){last.focus();last.select();} }, 50);
}
function saveSettings() {
  if (!st.running) { const mins=st.mode==='focus'?cfg.focus:st.mode==='short'?cfg.short:cfg.long; st.rem=st.total=mins*60; updateDisp(); updateRing(1); }
  lsSet('pomo_cfg', cfg);
  lsSet('pomo_cats', categories);
  renderDots(); document.getElementById('set-wrap').classList.remove('show'); showToast('設定を保存しました ✓');
}

/* ══ NAV ══ */
function goPage(pgId, navId) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(pgId).classList.add('active');
  ['n0','n1','n2','n0b','n1b','n2b','n0c','n1c','n2c'].forEach(id => {
    const el = document.getElementById(id); if (el) el.classList.toggle('active', id.startsWith(navId));
  });
  if (pgId === 'pg-log') renderLog();
}

/* ══ BG ══ */
const bgEl=document.getElementById('bg'), bgImg=document.getElementById('bg-image');
const oceanEl=document.getElementById('ocean-anim'), sunEl=document.getElementById('sun'), lhEl=document.getElementById('lh');
function selPreset(name) {
  document.querySelectorAll('.gi').forEach(el=>el.classList.remove('sel'));
  const el=document.getElementById('pr-'+name); if(el) el.classList.add('sel');
  if (name==='roca') { bgEl.style.background=BG_DEF; bgImg.style.opacity=0; bgImg.style.backgroundImage=''; oceanEl.style.display='block'; sunEl.style.display='block'; lhEl.style.display='block'; }
  else { bgEl.style.background=BG_PRESETS[name]; bgImg.style.opacity=0; bgImg.style.backgroundImage=''; oceanEl.style.display='none'; sunEl.style.display='none'; lhEl.style.display='none'; }
  savedBg = {type:'preset', name};
  lsSet('pomo_bg', savedBg);
  showToast('背景を変更しました ✨');
}
function clearBg() {
  document.querySelectorAll('.gi').forEach(el=>el.classList.remove('sel'));
  document.getElementById('pr-roca').classList.add('sel');
  bgEl.style.background=BG_DEF; bgImg.style.opacity=0; bgImg.style.backgroundImage='';
  oceanEl.style.display='block'; sunEl.style.display='block'; lhEl.style.display='block';
  savedBg = {type:'preset', name:'roca'};
  lsSet('pomo_bg', savedBg);
  showToast('デフォルト背景に戻しました');
}
function addPhotos(e) {
  const files = [...e.target.files];
  if (!files.length) return;
  let lastId = null;
  files.forEach((file, idx) => {
    const reader = new FileReader();
    reader.onload = ev => {
      const url = ev.target.result;
      const id = 'ph-' + Date.now() + '-' + idx;
      const grid = document.getElementById('galgrid');
      const wrap = grid.querySelector('.gup');
      const item = document.createElement('div');
      item.className = 'gi'; item.id = id;
      item.onclick = () => selPhoto(url, id);
      item.innerHTML = `<div style="width:100%;height:100%;background:url(${url}) center/cover no-repeat;border-radius:11px;"></div><div class="gck">✓</div>`;
      // 最初の写真の直後に挿入（追加順を保つ）
      const firstPhoto = grid.querySelector('.gi:not([id^="pr-"])');
      if (firstPhoto) grid.insertBefore(item, firstPhoto);
      else grid.insertBefore(item, wrap.nextSibling);
      lastId = id;
      // 最後の1枚を自動選択
      if (idx === files.length - 1) selPhoto(url, id);
    };
    reader.readAsDataURL(file);
  });
  e.target.value = '';
  showToast('📸 ' + files.length + '枚追加しました');
}
function selPhoto(url,id) {
  document.querySelectorAll('.gi').forEach(el=>el.classList.remove('sel'));
  document.getElementById(id).classList.add('sel');
  bgImg.style.backgroundImage=`url(${url})`; bgImg.style.opacity=1;
  bgEl.style.background=BG_DEF; oceanEl.style.display='none'; sunEl.style.display='none'; lhEl.style.display='none';
  savedBg = {type:'photo', url};
  lsSet('pomo_bg', savedBg);
  showToast('背景を設定しました ✨');
}

/* ══ TOAST ══ */
function showToast(msg) { const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500); }

/* ══ INIT ══ */
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('rp').style.strokeDasharray = CIRC;
  updateRing(1); updateClock(); setInterval(updateClock, 15000);
  renderDots(); renderLog();

  // タイマー設定を画面に反映
  const mins = cfg.focus;
  st.rem = st.total = mins * 60;
  updateDisp();

  // 保存済み背景を復元
  if (savedBg.type === 'photo' && savedBg.url) {
    bgImg.style.backgroundImage = `url(${savedBg.url})`;
    bgImg.style.opacity = 1;
    bgEl.style.background = BG_DEF;
    oceanEl.style.display='none'; sunEl.style.display='none'; lhEl.style.display='none';
  } else {
    const name = savedBg.name || 'roca';
    const el = document.getElementById('pr-'+name);
    if (el) el.classList.add('sel');
    if (name === 'roca') {
      bgEl.style.background=BG_DEF;
      oceanEl.style.display='block'; sunEl.style.display='block'; lhEl.style.display='block';
    } else if (BG_PRESETS[name]) {
      bgEl.style.background=BG_PRESETS[name];
      oceanEl.style.display='none'; sunEl.style.display='none'; lhEl.style.display='none';
    }
    document.getElementById('pr-roca').classList.toggle('sel', name==='roca');
  }
});
</script>
</body>
</html>
